
{%extends 'bases/base.html '%}

{% block page_content%}

<form method="post" class="form-inline" action="">
    {%csrf_token%}
    <div class="col-xl-12 col-md-12 mb-12">
<!-- Para utilizar este mismo formulario para el edit vamos a hacer un if que permita cambiar colores y mejorar experiencia de usuario -->
        {% if obj %}
        <div class="card border-left-warning shadow h-100 py-2">
        {% else %}
        <div class="card border-left-success shadow h-100 py-2">
        {% endif %}
            <div class="card-body">
                <div class="row no-gutters align-items-center">
                    <div class="col mr-2">
                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">
                            <!-- Para que sea utilizado tanto para el new como para el edit (proyecto a futuro es que sea una ventana modal) -->
                            {% if obj %} Editar {% else %} Nueva {% endif %} Marca
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="row">
                            <div class="col-10">
                                <!-- <div class="input-group">
                                    <input type="text" name="categoria" maxlength="100" class="form-control" required id="id_categoria" placeholder="Categoria" value="{% if obj %} {{ obj.categoria }} {% endif %}">
                                </div> -->
                                {{ form.categoria }}
                            </div>
                            <div class="col-lg-8 col-sm-6">
                                <div class="input-group">
                                    <input type="text" name="descripcion" maxlength="100" class="form-control" required id="id_descripcion" placeholder="Descripcion" value="{% if obj %} {{ obj.descripcion }} {% endif %}">
                                </div>
                            </div>
                            <div class="col-sm-10">
                                <div class="form-group">
                                    <label for="id_estado">Estado</label>
                                    <input type="checkbox" name="estado" class="form-control" id="id_estado" {% if obj.estado %} checked {% endif %}">
                                </div>
                            </div>
                        <div class="dropdown-divider"></div>
                        <div class="row">
                            <div class="col">
                                <button type="submit" class="btn btn-success"><span class="fa fa-save"></span>Guardar</button>
                                <a href="{% url 'inv:marcas_list' %}" class="btn btn-danger"> <span class="fa fa-undo"></span>Cancelar</a>
                            </div>
                        </div>
                        
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>


{% endblock %}

{% block footer %}
{% endblock %}

{% block js_page%}
{%endblock%}
